micronaut:
  server:
    port: ${PORT:8080}
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins-regex:
            - "^https://.*\\.vercel\\.app$"
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
  security:
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:prod-secret-change-me-please-at-least-32-bytes-long-0123456789}

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false

javamail:
  password: ${MAIL_PASSWORD:}

app:
  qrcode:
    basepath: "qrcodes/"
    baseurl: ${APP_QRCODE_BASEURL:https://moeda-estudantil-api.onrender.com/api/qrcodes/}
