micronaut:
  server:
    port: ${PORT:8080}
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins-regex:
            - ${APP_CORS_ALLOWED_ORIGINS_REGEX:^https://.*\.vercel\.app$}
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
  security:
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:prod-secret-change-me-please-at-least-32-bytes-long-0123456789}

datasources:
  default:
    url: ${DATABASE_URL:jdbc:h2:mem:moedaestudantil;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driverClassName: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false

sql:
  init:
    enabled: false

javamail:
  password: ${MAIL_PASSWORD:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    allowed-origins-regex: ${APP_CORS_ALLOWED_ORIGINS_REGEX:^https://.*\.vercel\.app$}
  qrcode:
    basepath: ${APP_QRCODE_BASEPATH:qrcodes/}
    baseurl: ${APP_QRCODE_BASEURL:https://seu-backend.onrender.com/api/qrcodes/}

