micronaut:
  application:
    name: moeda-estudantil-micronaut
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins-regex: ${APP_CORS_ALLOWED_ORIGINS_REGEX:^https?://localhost(:[0-9]+)?$}
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
  router:
    static-resources:
      default:
        enabled: true
        mapping: /**
        paths: classpath:static
  security:
    enabled: true
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:}
    intercept-url-map:
      - pattern: /
        access:
          - isAnonymous()
      - pattern: /index.html
        access:
          - isAnonymous()
      - pattern: /alunos.html
        access:
          - isAnonymous()
      - pattern: /empresas.html
        access:
          - isAnonymous()
      - pattern: /app.css
        access:
          - isAnonymous()
      - pattern: /app.js
        access:
          - isAnonymous()
      - pattern: /health/**
        access:
          - isAnonymous()
      - pattern: /api/auth/login
        access:
          - isAnonymous()
      - pattern: /api/instituicoes
        access:
          - isAnonymous()
      - pattern: /api/qrcodes/**
        access:
          - isAnonymous()
      - pattern: /api/alunos
        http-method: POST
        access:
          - isAnonymous()
      - pattern: /api/empresas
        http-method: POST
        access:
          - isAnonymous()
      - pattern: /api/transacoes/distribuicao
        http-method: POST
        access:
          - ROLE_PROFESSOR
      - pattern: /api/extratos/professores/**
        http-method: GET
        access:
          - ROLE_PROFESSOR
      - pattern: /api/saldo-semestral/**
        http-method: POST
        access:
          - ROLE_PROFESSOR
      - pattern: /api/extratos/alunos/**
        http-method: GET
        access:
          - ROLE_ALUNO
      - pattern: /api/resgates/**
        access:
          - ROLE_ALUNO
      - pattern: /api/empresas/*/vantagens
        http-method: POST
        access:
          - ROLE_EMPRESA
      - pattern: /**
        access:
          - isAuthenticated()

datasources:
  default:
    url: jdbc:h2:mem:moedaestudantil;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''

jpa:
  default:
    entity-scan:
      packages: br.com.moedaestudantil.model
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: true

flyway:
  datasources:
    default:
      enabled: false

sql:
  init:
    enabled: true
    schema-locations:
      - classpath:data.sql

