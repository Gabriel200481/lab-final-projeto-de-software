<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Empresa</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 2rem; background: #f6fafc; color: #1c2733; }
    form, table { background: #fff; border-radius: 12px; padding: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    input, button { margin: .35rem 0; padding: .6rem; width: 100%; }
    button { background: #168f5c; color: #fff; border: 0; border-radius: 8px; cursor: pointer; }
    th, td { padding: .5rem; border-bottom: 1px solid #ddd; text-align: left; }
    table { width: 100%; margin-top: 1rem; border-collapse: collapse; }
  </style>
</head>
<body>
  <h1>Cadastro de Empresa Parceira</h1>

  <form id="empresaForm">
    <input id="nome" placeholder="Nome do responsavel" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="senha" type="password" placeholder="Senha" required>
    <input id="nomeFantasia" placeholder="Nome Fantasia" required>
    <button type="submit">Cadastrar Empresa</button>
  </form>

  <table>
    <thead>
      <tr><th>Nome</th><th>Email</th><th>Nome Fantasia</th><th>Qtd. Vantagens</th></tr>
    </thead>
    <tbody id="empresasBody"></tbody>
  </table>

  <script>
    async function carregarEmpresas() {
      const response = await fetch('/api/empresas');
      const empresas = await response.json();
      const body = document.getElementById('empresasBody');
      body.innerHTML = '';
      empresas.forEach(e => {
        body.innerHTML += `<tr><td>${e.nome}</td><td>${e.email}</td><td>${e.nomeFantasia}</td><td>${e.vantagens.length}</td></tr>`;
      });
    }

    document.getElementById('empresaForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
        nomeFantasia: document.getElementById('nomeFantasia').value
      };

      const response = await fetch('/api/empresas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const error = await response.json();
        alert(error.error || 'Falha ao cadastrar empresa');
        return;
      }

      event.target.reset();
      await carregarEmpresas();
    });

    carregarEmpresas();
  </script>
</body>
</html>
