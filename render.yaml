services:
  - type: web
    name: moeda-estudantil-api
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: "mvn -DskipTests clean package"
    startCommand: "java -Dmicronaut.environments=prod -jar target/moeda-estudantil-micronaut-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS_REGEX
        value: "^https://.*\\.vercel\\.app$"
      - key: APP_QRCODE_BASEURL
        value: "https://moeda-estudantil-api.onrender.com/api/qrcodes/"
